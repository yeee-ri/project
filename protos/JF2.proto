#VRML_SIM R2021b utf8

PROTO JF2 [
  field  SFVec3f     translation     0 0 0
  field  SFRotation  rotation        0 0 -1 1.5708
  field  SFString    name            "jf2"
  field  SFString    controller      "try_try"
  field  MFString    controllerArgs  []
  field  SFInt32     channel         0
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    name IS name
    controller IS controller
    controllerArgs IS controllerArgs
    scale 0.5 0.5 0.5
    children [
      Transform {
        translation 0.13 0 -0.2
        rotation 0 0 1 -1.5707096
        children [
          RobotisLds01 {        
            rotation 0 1 0 -3.141592
            name "HeadLidar"
            resolution 360
          } 
          Camera{
          translation 0.02 0 -0.2
          rotation 0 0 1 -1.5707096
          name "kinect21"
          width 400
          height 300
          fieldOfView 1.0855 #62.2 horizontal
        }
      ]
    }


    RangeFinder {
      name "kinect2D"
      translation 0 0.127 0.10
      rotation 1 0 0 1.57
      width 400
      height 300
      fieldOfView 1.0855 #62.2 horizontal
      maxRange 4.0
    }
      InertialUnit { name "InertialUnit" }
      Compass { name "Compass" }
      GPS { name "GPS" }
      DEF ACCEL Accelerometer { name "Accelerometer" lookupTable [-39.24 0 0 39.24 1024 0] }
      DEF GYRO Gyro { name "Gyro" lookupTable [-27.925 0 0 27.925 1024 0] }

      DEF RECEIVER Receiver { name "receiver" channel IS channel }
      DEF EMITTER Emitter { name "emitter" channel IS channel }
      DEF PHYSICS_RECEIVER Receiver { name "physics_receiver" type "serial" channel 10 byteSize 192 }
      DEF PHYSICS_EMITTER Emitter { name "physics_emitter" type "serial" byteSize 96 }

      Transform {
        children [
          Transform {
            #scale 0.25 0.25 0.25
            children [
              Shape {
                appearance PBRAppearance { baseColor 0.7 0.7 0.7 roughness 1 metalness 1 }
                geometry Mesh { url "meshes/base_link.stl" }
              }
            ]
          }
        ]
      }


